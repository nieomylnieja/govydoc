name: Release binaries
run-name: "Release ${{ github.ref_name }} binaries for ${{ github.repository }} by @${{ github.actor }}"

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Release Binaries
        uses: goreleaser/goreleaser-action@7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
